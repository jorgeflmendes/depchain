name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Build and run tests
        run: ./gradlew --no-daemon clean test integrationTest --continue

      - name: Collect test reports
        if: always()
        run: |
          mkdir -p reports/test-reports

          if [ -d build/reports/tests ]; then
            cp -R build/reports/tests reports/test-reports/
          fi

          if [ -d build/test-results ]; then
            cp -R build/test-results reports/test-reports/
          fi

          if [ ! -d reports/test-reports/tests ] && [ ! -d reports/test-reports/test-results ]; then
            echo "No test reports were generated in this run." > reports/test-reports/README.txt
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/test-reports/
          if-no-files-found: error
