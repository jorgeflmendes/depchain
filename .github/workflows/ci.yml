name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build, populate keys, and run tests
        run: mvn --batch-mode --no-transfer-progress clean compile exec:java@populate verify

      - name: Collect test reports
        if: always()
        run: |
          mkdir -p reports/test-reports

          if [ -d target/surefire-reports ]; then
            cp -R target/surefire-reports reports/test-reports/
          fi

          if [ -d target/failsafe-reports ]; then
            cp -R target/failsafe-reports reports/test-reports/
          fi

          if [ ! -d reports/test-reports/surefire-reports ] && [ ! -d reports/test-reports/failsafe-reports ]; then
            echo "No test reports were generated in this run." > reports/test-reports/README.txt
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/test-reports/
          if-no-files-found: error
