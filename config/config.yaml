# Configuration file for the DepChain consensus protocol implementation, specifying system parameters, replica details, client settings, timeouts, and network configurations.
system:
  name: depchain
  environment: local
  n: 4
  f: 1
  leaderElection: round-robin
  baseView: 1

# Configuration for the replicas that participate in the consensus protocol, including their network addresses and public key paths
replicas:
  - id: server1
    host: 127.0.0.1
    consensusPort: 10001
    clientPort: 11001
    publicKeyPath: config/keys/server1/public/replica.pem
  - id: server2
    host: 127.0.0.1
    consensusPort: 10002
    clientPort: 11002
    publicKeyPath: config/keys/server2/public/replica.pem
  - id: server3
    host: 127.0.0.1
    consensusPort: 10003
    clientPort: 11003
    publicKeyPath: config/keys/server3/public/replica.pem
  - id: server4
    host: 127.0.0.1
    consensusPort: 10004
    clientPort: 11004
    publicKeyPath: config/keys/server4/public/replica.pem

# Configuration for the client that interacts with the replicas to send requests and receive responses
client:
  id: client
  host: 127.0.0.1
  requestTimeoutMs: 3000
  knownReplicas:
    - server1
    - server2
    - server3
    - server4

# Timeouts for various operations in the consensus protocol, in milliseconds
timeouts:
  viewChangeMs: 1500
  retransmitMs: 250
  maxBackoffMs: 10000

# Parameters for the stubborn retransmission mechanism used by replicas to resend messages to peers
stubborn:
  baseDelayMs: 100
  maxDelayMs: 5000
  jitterRatio: 0.20
  maxPending: 50000
  heapCompactMinSize: 1024
  maxRetryAttempts: -1
  maxTrackedLifetimeMs: -1

# Parameters for perfect-link buffering and state cleanup
perfect:
  maxWindowSize: 1000
  maxStreamStates: 4096
  streamIdleTtlMs: 60000

# Network configuration parameters, including the maximum packet size for messages sent between replicas and clients
network:
  maxPacketSize: 8192
