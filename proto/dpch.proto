syntax = "proto3";

package depchain;

import "validate.proto";

option java_multiple_files = true;
option java_package = "pt.ulisboa.depchain.proto";

enum DpchPacketType {
  DPCH_PACKET_TYPE_UNSPECIFIED = 0;
  DPCH_PACKET_TYPE_DATA = 1;
  DPCH_PACKET_TYPE_ACK = 2;
  DPCH_PACKET_TYPE_SYN = 3;
  DPCH_PACKET_TYPE_FIN = 4;
}

message DpchPacket {
  option (buf.validate.message).cel = {
    id: "dpch.packet-type.specified"
    message: "packet_type must be specified"
    expression: "this.packet_type != 0"
  };
  option (buf.validate.message).cel = {
    id: "dpch.ack-combination.valid"
    message: "has_ack is only supported for SYN and FIN packets"
    expression: "this.has_ack ? this.packet_type in [3, 4] : true"
  };

  optional uint64 connection_id = 1 [(buf.validate.field).required = true];
  optional uint32 sequence_number = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).uint32.lte = 65535
  ];
  optional DpchPacketType packet_type = 3 [(buf.validate.field).required = true];
  optional bool has_ack = 4 [(buf.validate.field).required = true];
  optional bytes payload = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).bytes.max_len = 65535
  ];
}
