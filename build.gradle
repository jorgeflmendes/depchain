plugins {
  id 'java'
  id 'application'
}
group = 'pt.ulisboa.depchain'
version = '0.1.0-SNAPSHOT'
repositories {
  mavenCentral()
}
java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(21)
  }
}

sourceSets {
  main {
    java {
      srcDirs = ['src/server', 'src/client', 'src/shared']
    }
  }
  test {
    java {
      srcDirs = ['src/test/java']
    }
  }
}

dependencies {
  testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
}
tasks.withType(Test).configureEach {
  useJUnitPlatform()
}
application {
  mainClass = 'pt.ulisboa.depchain.server.Main'
  applicationDefaultJvmArgs = ['-Ddepchain.config=config/replicas.yaml']
}
