syntax = "proto3";

package depchain;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "pt.ulisboa.depchain.proto";

enum DpchPacketType {
  DPCH_PACKET_TYPE_UNSPECIFIED = 0;
  DPCH_PACKET_TYPE_DATA = 1;
  DPCH_PACKET_TYPE_ACK = 2;
}

message DpchPacket {
  option (buf.validate.message).cel = {
    id: "dpch.packet-type.specified"
    message: "packet_type must be specified"
    expression: "this.packet_type != 0"
  };
  option (buf.validate.message).cel = {
    id: "dpch.payload.matches-type"
    message: "data packets require a non-empty payload and ack packets must not carry one"
    expression: "(this.packet_type == 1 && has(this.payload) && size(this.payload) > 0) || (this.packet_type == 2 && !has(this.payload))"
  };
  optional fixed64 connection_id = 1 [(buf.validate.field).required = true];
  optional uint32 sequence_number = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).uint32.lte = 65535
  ];
  optional DpchPacketType packet_type = 3 [(buf.validate.field).required = true];
  optional bytes payload = 4 [(buf.validate.field).bytes.max_len = 65535];
}
